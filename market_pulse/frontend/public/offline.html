<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TarMinGO — Çevrimdışı</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #faf6ef; color: #2a2620; min-height: 100vh; display: grid; place-items: center; }
      main { width: min(560px, calc(100vw - 32px)); background: #fff; border: 1px solid #e8dcc7; border-radius: 16px; padding: 32px; box-shadow: 0 10px 30px rgba(49, 35, 20, 0.08); }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { margin: 0 0 12px; line-height: 1.6; }
      a { display: inline-block; margin-top: 12px; color: #fff; background: #5f4e2f; text-decoration: none; padding: 12px 18px; border-radius: 10px; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>Çevrimdışısınız</h1>
      <p>İnternet bağlantısı yok. Daha önce açtığınız sayfalar çalışabilir; yeni içerikler bağlantı geldiğinde yenilenir.</p>
      <p>You are offline. Cached pages may still work; new content needs an internet connection.</p>
      <a href="/tr">Ana sayfaya dön</a>
    </main>
  </body>
</html>
