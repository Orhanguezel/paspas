name: Deploy Paspas

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: paspas-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Build backend
        working-directory: backend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build admin panel
        working-directory: admin_panel
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Package deployment artifact
        run: |
          tar -czf /tmp/paspas-deploy.tar.gz \
            README.md \
            backend/dist \
            admin_panel/.next \
            admin_panel/public

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GZL_WEB_SSH_KEY }}

      - name: Upload artifact to gzl-web
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null /tmp/paspas-deploy.tar.gz orhan@72.61.93.212:/var/www/paspas/.deploy/paspas-deploy.tar.gz

      - name: Deploy artifact on gzl-web
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null orhan@72.61.93.212 '/home/orhan/bin/deploy-paspas-artifact /var/www/paspas/.deploy/paspas-deploy.tar.gz'
