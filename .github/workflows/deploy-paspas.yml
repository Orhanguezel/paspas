name: Deploy Paspas

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: paspas-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GZL_WEB_SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 72.61.93.212 >> ~/.ssh/known_hosts

      - name: Deploy on gzl-web
        run: |
          ssh orhan@72.61.93.212 '/home/orhan/bin/deploy-paspas'

      - name: Post-deploy health checks
        run: |
          ssh orhan@72.61.93.212 '
            set -euo pipefail
            api_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8078/api/site_settings/default-locale)
            admin_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3078/)
            test "$api_code" = "200"
            test "$admin_code" = "200" -o "$admin_code" = "307" -o "$admin_code" = "308"
          '
